name: Build Ruby Compilers

on:
  workflow_dispatch:
    inputs:
      push:
        description: Push images
        required: true
        type: boolean
        default: true
      dockerfile_suffix:
        description: "Dockerfile suffix (e.g. .gcc, .clang)"
        required: true
        type: string
      tag_suffix:
        description: "Tag suffix (e.g. -gcc, -clang)"
        required: true
        type: string
  workflow_call:
    inputs:
      push:
        required: false
        type: boolean
        default: false
      dockerfile_suffix:
        required: true
        type: string
      tag_suffix:
        required: true
        type: string

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # gnu
          - engine: ruby
            version: "1.8"
            libc: gnu
            arch: ["x86_64"]
          - engine: ruby
            version: "1.9"
            libc: gnu
            arch: ["x86_64"]
          - engine: ruby
            version: "2.0"
            libc: gnu
            arch: ["x86_64"]
          - engine: ruby
            version: "2.1"
            libc: gnu
            arch: ["x86_64", "aarch64"]
          - engine: ruby
            version: "2.2"
            libc: gnu
            arch: ["x86_64", "aarch64"]
