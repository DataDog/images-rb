          - engine: ruby
            version: "3.1"
            libc: gnu
            arch: ["x86_64", "aarch64"]
          - engine: ruby
            version: "3.2"
            libc: gnu
            arch: ["x86_64", "aarch64"]
          - engine: ruby
            version: "3.3"
            libc: gnu
            arch: ["x86_64", "aarch64"]
          - engine: ruby
            version: "3.4"
            libc: gnu
            arch: ["x86_64", "aarch64"]
          - engine: ruby
            version: "3.5"
            libc: gnu
            arch: ["x86_64", "aarch64"]
          - engine: ruby
            version: "4.0"
            libc: gnu
            arch: ["x86_64", "aarch64"]
          # musl
          - engine: ruby
            version: "2.1"
            libc: musl
            arch: ["x86_64"]
          - engine: ruby
