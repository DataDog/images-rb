name: Main

on:
  push:
    branches:
      - "**"

jobs:
  services:
    name: Services
    uses: ./.github/workflows/services.yml
    permissions:
      packages: write

  ruby:
    name: Ruby
    uses: ./.github/workflows/ruby.yml
    permissions:
      packages: write

  nix:
    name: Nix
    uses: ./.github/workflows/nix.yml
    permissions:
      contents: read
      id-token: write

  complete:
    name: Main (complete)
    needs:
      - services
      - ruby
      - nix
    runs-on: ubuntu-24.04
    steps:
      - name: Done
        run: |
          echo 'DONE!'
