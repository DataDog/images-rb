name: Ruby

on:
  workflow_dispatch:
    inputs:
      push:
        description: Push images
        required: true
        type: boolean
        default: true
  workflow_call:
    inputs:
      push:
        required: false
        type: boolean
        default: false

jobs:
  # Stage 1: Build all base images (gnu, musl, centos)
  #
  # Release tags are always pushed here because downstream compiler stages
  # FROM the release tag (e.g. Dockerfile.musl.gcc does FROM ...ruby:3.3-musl)
  base:
    uses: ./.github/workflows/build-ruby.yml
    with:
      push: true
    secrets: inherit

  # Stage 2: Build musl compiler images (musl.gcc, musl.clang)
  #
  # These depend on the base musl images being pushed to the registry.
  # gcc and clang are independent of each other and can run in parallel.
  gcc:
    needs: base
    uses: ./.github/workflows/build-ruby-compilers.yml
    with:
      push: ${{ inputs.push }}
      dockerfile_suffix: ".gcc"
      tag_suffix: "-gcc"
    secrets: inherit

  clang:
    needs: base
    uses: ./.github/workflows/build-ruby-compilers.yml
    with:
      push: ${{ inputs.push }}
      dockerfile_suffix: ".clang"
      tag_suffix: "-clang"
    secrets: inherit
